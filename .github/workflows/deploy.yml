name: Deploy to easyname (production)

# TODO: populate secrets (EASYNAME_HOST, EASYNAME_USER, EASYNAME_PASSWORD,
# EASYNAME_REMOTE_PATH) in the repo settings before enabling this workflow.
# Until then it will fail fast; that's expected until Yves supplies SFTP
# credentials and the domain is pointed at easyname.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          protocol: sftp
          server: ${{ secrets.EASYNAME_HOST }}
          username: ${{ secrets.EASYNAME_USER }}
          password: ${{ secrets.EASYNAME_PASSWORD }}
          server-dir: ${{ secrets.EASYNAME_REMOTE_PATH }}
          local-dir: ./out/
