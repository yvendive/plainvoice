name: Deploy to easyname (production)

# Deploys the static export in ./out to easyname Large Hosting via FTPS.
# Requires four repo secrets: EASYNAME_HOST, EASYNAME_USER, EASYNAME_PASSWORD,
# EASYNAME_REMOTE_PATH. Trigger manually via workflow_dispatch until we're
# ready to auto-deploy on every merge to main.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          protocol: ftps
          server: ${{ secrets.EASYNAME_HOST }}
          username: ${{ secrets.EASYNAME_USER }}
          password: ${{ secrets.EASYNAME_PASSWORD }}
          server-dir: ${{ secrets.EASYNAME_REMOTE_PATH }}
          local-dir: ./out/
